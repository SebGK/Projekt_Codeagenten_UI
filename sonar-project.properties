sonar.projectKey=codeagenten-ui
sonar.organization=your-org
sonar.projectName=Codeagenten UI
sonar.projectVersion=1.0.0

# Source code
sonar.sources=src,scripts
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.min.js,**/coverage/**

# Tests
sonar.tests=src,scripts
sonar.test.inclusions=**/*.test.js,**/*.spec.js,**/*.test.ts,**/*.spec.ts
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.js,**/*.spec.js,**/*.test.ts,**/*.spec.ts,**/node_modules/**

# Language
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true
